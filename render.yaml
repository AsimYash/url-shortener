# render.yaml — Render.com Deployment Configuration
#
# This file lets Render auto-configure your service when you connect your GitHub repo.
# Render reads this file and sets up the service automatically.
#
# HOW TO USE:
# 1. Push this file to your GitHub repository
# 2. On Render: New → Blueprint → Connect your repo
# 3. Render reads this file and creates the service with the right settings
# 4. Add your actual DB credentials in Render's Environment dashboard

services:
  - type: web
    name: linksnip-url-shortener
    env: java
    region: oregon            # Free tier region (oregon or frankfurt)
    plan: free                # Free plan (spins down after 15 min of inactivity)

    # Build: Package the app into a JAR
    buildCommand: mvn clean package -DskipTests

    # Start: Run the JAR
    startCommand: java -jar target/url-shortener-1.0.0.jar

    # Health check path — Render pings this to know if your app is up
    healthCheckPath: /actuator/health

    # Environment variables
    # IMPORTANT: Set DB_PASSWORD in Render's dashboard (never hardcode passwords!)
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: APP_BASE_URL
        # Replace with your actual Render URL after first deployment
        value: https://linksnip-url-shortener.onrender.com

      - key: DB_URL
        # Replace with your cloud MySQL connection string
        # Example (PlanetScale): jdbc:mysql://aws.connect.psdb.cloud/urlshortener?useSSL=true&serverTimezone=UTC
        value: jdbc:mysql://YOUR_CLOUD_DB_HOST/urlshortener?useSSL=true&serverTimezone=UTC

      - key: DB_USERNAME
        value: your_db_username

      - key: DB_PASSWORD
        # This will show as "set from environment" in Render — value set in dashboard
        sync: false           # sync: false = must be set manually in Render dashboard
