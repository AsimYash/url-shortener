<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortened! — LinkSnip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a th:href="@{/}" class="nav-brand">🔗 LinkSnip</a>
        <div class="nav-links">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/swagger-ui.html}" target="_blank">API Docs</a>
        </div>
    </div>
</nav>

<main>
    <section class="hero">
        <div class="container">

            <!--
                th:if="${success}" → this entire block renders only if
                the "success" flash attribute is in the model (set by WebController)
            -->
            <div class="result-card" th:if="${success}">
                <div class="success-icon">🎉</div>
                <h1 class="result-title">Your Short URL is Ready!</h1>

                <!--
                    th:text="${result.shortUrl}" → renders the shortUrl field
                    from the UrlResponse object stored in the "result" flash attribute
                -->
                <div class="short-url-display">
                    <a th:href="${result.shortUrl}" th:text="${result.shortUrl}"
                       target="_blank" class="short-url-link">
                        Short URL here
                    </a>
                    <button onclick="copyToClipboard()" class="btn btn-copy" id="copyBtn">
                        📋 Copy
                    </button>
                </div>

                <!-- Hidden input for JavaScript clipboard copy -->
                <input type="hidden" id="shortUrlValue" th:value="${result.shortUrl}">

                <!-- URL Details Panel -->
                <div class="details-panel">
                    <div class="detail-row">
                        <span class="detail-label">Original URL:</span>
                        <span class="detail-value truncate" th:text="${result.originalUrl}">original</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Short Code:</span>
                        <span class="detail-value code" th:text="${result.shortCode}">code</span>
                    </div>
                    <div class="detail-row" th:if="${result.title}">
                        <span class="detail-label">Title:</span>
                        <span class="detail-value" th:text="${result.title}">title</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Created:</span>
                        <!--
                            #temporals.format() is a Thymeleaf utility for formatting dates.
                            'dd MMM yyyy, HH:mm' = "15 Jan 2024, 10:30"
                        -->
                        <span class="detail-value"
                              th:text="${#temporals.format(result.createdAt, 'dd MMM yyyy, HH:mm')}">
                            date
                        </span>
                    </div>
                    <div class="detail-row" th:if="${result.expiresAt}">
                        <span class="detail-label">Expires:</span>
                        <span class="detail-value"
                              th:text="${#temporals.format(result.expiresAt, 'dd MMM yyyy, HH:mm')}">
                            expiry
                        </span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <a th:href="@{/}" class="btn btn-primary">✂️ Shorten Another URL</a>
                    <a th:href="@{/dashboard}" class="btn btn-secondary">📊 View Dashboard</a>
                </div>
            </div>

        </div>
    </section>
</main>

<footer class="footer">
    <div class="container">
        <p>Built with ❤️ using Spring Boot</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
<script>
    function copyToClipboard() {
        const url = document.getElementById('shortUrlValue').value;
        navigator.clipboard.writeText(url).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = '✅ Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '📋 Copy';
                btn.classList.remove('copied');
            }, 2000);
        });
    }
</script>
</body>
</html>
