# ============================================================
# URL SHORTENER — APPLICATION CONFIGURATION
# ============================================================
# This file configures Spring Boot, the database, logging, etc.
#
# ENVIRONMENT VARIABLES:
# Values like ${DB_URL:jdbc:mysql://localhost:3306/urlshortener}
# mean: "use the DB_URL env var; if not set, use the default after :"
#
# For local development:  Edit the defaults below
# For production:         Set actual environment variables (never hardcode secrets!)
# ============================================================

# ── Server Configuration ─────────────────────────────────────
server.port=8080

# ── Application Configuration ────────────────────────────────
# Base URL used to build short URLs in responses
# Example: https://myapp.onrender.com (no trailing slash)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ── Database Configuration (MySQL) ────────────────────────────
#
# spring.datasource.url:
#   jdbc:mysql://         → JDBC protocol for MySQL
#   localhost:3306/       → host:port (use your cloud DB host in production)
#   urlshortener          → database name (must exist in MySQL)
#   ?useSSL=false         → disable SSL for local dev (enable in production)
#   &serverTimezone=UTC   → avoid timezone issues
#   &allowPublicKeyRetrieval=true → required for some MySQL 8.x versions
#
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate Configuration ─────────────────────────────
#
# spring.jpa.hibernate.ddl-auto:
#   create-drop  → Creates tables on start, drops on stop (dev only, loses data!)
#   create       → Creates tables on start (loses existing data!)
#   update       → Adds new columns/tables but NEVER drops existing (good for dev)
#   validate     → Only checks schema matches entities (good for production)
#   none         → Do nothing (use Flyway/Liquibase migrations in production)
#
# We use "update" for development — safe but not for production!
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL Hibernate generates in the logs (useful for learning/debugging)
# Set to false in production to reduce log noise
spring.jpa.show-sql=true

# Formats the SQL nicely with line breaks (easier to read)
spring.jpa.properties.hibernate.format_sql=true

# Database dialect tells Hibernate which SQL syntax to use
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Logging Configuration ───────────────────────────────────────
#
# Log levels: TRACE < DEBUG < INFO < WARN < ERROR < OFF
# In production, use WARN or ERROR to reduce log volume.
#
# Root level: INFO means we see INFO, WARN, ERROR from everything
logging.level.root=INFO

# Our application: DEBUG for detailed logs during development
logging.level.com.urlshortener=DEBUG

# Hibernate SQL: DEBUG to see generated queries (set WARN in production)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file location (optional — logs to console by default)
# logging.file.name=logs/url-shortener.log

# ── Thymeleaf Configuration ─────────────────────────────────────
# Cache templates in production (true), disable for live editing in dev (false)
spring.thymeleaf.cache=false

# ── Actuator Configuration (Health Checks) ─────────────────────
# Exposes /actuator/health endpoint — useful for deployment health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Swagger/OpenAPI Configuration ──────────────────────────────
# Custom path for Swagger UI (default is /swagger-ui.html, this keeps it the same)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ── Connection Pool Configuration (HikariCP) ──────────────────
# HikariCP is Spring Boot's default connection pool
# It maintains a pool of DB connections for performance
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
