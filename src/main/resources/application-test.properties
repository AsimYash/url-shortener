# ============================================================
# TEST PROFILE CONFIGURATION
# ============================================================
# This file activates when Spring profile = "test"
# Our unit tests use @ActiveProfiles("test") to load this config.
#
# We use H2 (in-memory database) instead of MySQL for tests:
#   ✅ No MySQL needed to run tests
#   ✅ Each test starts with a fresh DB
#   ✅ Tests run in milliseconds
#   ✅ Tests work in CI/CD pipelines without DB setup
# ============================================================

# H2 in-memory database URL
# MODE=MySQL makes H2 behave like MySQL (compatible SQL syntax)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console — accessible at /h2-console during tests (useful for debugging)
spring.h2.console.enabled=true

# Create and drop tables for each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable SQL logging in tests to keep output clean
spring.jpa.show-sql=false
logging.level.com.urlshortener=WARN
logging.level.org.hibernate.SQL=WARN

# Base URL for test responses
app.base-url=http://localhost:8080
